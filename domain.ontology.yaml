  - "When a dashboard is open in any browser tab other than the current Equipment Home Page tab, an indicator icon (with optional count) appears on that dashboard's tab/card on the Equipment Home Page; the indicator updates live."
  # ── App Routing ────────────────────────────────────────────────────────────
  - "New surfaces are URL-driven via Next.js App Router routes: /workspace, /workspace/folder/[folderId], /workspace/shared, /workspace/dashboard/[dashboardId]/edit, /dashboards/[dashboardId]/full, /share/[token]."
