  # ── Locked open-question resolutions (Apr 27 2026) ─────────────────────────
  - "Organization users are a fixed mock list; no invite-new-user flow exists."
  - "ShareLink access is restricted to users who exist in the organization directory; opening a link as anyone outside the directory blocks access with a 'not authorised' state. On save with edit permission via a link, the user is appended to Dashboard.contributorUserIds."
  - "Unpublishing a Dashboard does NOT revoke any DashboardShare or ShareLink. Asset Module is treated as a read-only 'qualified dashboards' surface; publish/unpublish only toggles Asset Module visibility — sharing grants persist."
  - "The 'open elsewhere' indicator is rendered ONLY on the Equipment Home Page (dashboard tabs and dashboard cards). Workspace dashboard cards do NOT show it."
  - "Only one Dashboard Editor session may be active per Dashboard at a time across the whole app. Opening the editor acquires a cross-tab edit lock keyed by dashboardId; if another tab already holds the lock, the new tab is denied entry and a 'This dashboard is being edited at the moment' notification/toast is shown. The lock is released on editor unmount, save, or pagehide."
  - "Dashboard.thumbnailUrl is populated by capturing a generated screenshot of the rendered dashboard widget grid (e.g. via html2canvas-style mock or a deterministic SVG/canvas mock); thumbnails refresh on save. v1 may use a deterministic placeholder image generator if a real screenshot library is not yet wired."
