# SPM ONE — Domain Ontology (Canonical)
# Revised Apr 2026 from audit + product clarifications.
# Updated Apr 2026: Equipment Home Page, Workspace module stub, Tools scoping,
# Data & Sync filter, Dashboard popup read-only mode.
# Updated Apr 27 2026: Full Workspace Module spec — folders, dashboard
# lifecycle (created/published), per-user ownership, shares, share links,
# comments, in-app alerts, full-screen dashboard viewer route, cross-tab
# open-state signalling.
# Updated Apr 27 2026 (rev 2): Workspace dashboards established as the
# canonical source of truth for dashboard metadata across all modules.
# Removed static dashboardCards registry; Equipment Home, Home Page Recents,
# Site/Plant Overview tab stacks derive their dashboard data from published
# WorkspaceDashboard records.
# Updated Apr 27 2026 (rev 3): What-If Scenario result 'View Data' navigates
# to Equipment Home for the run's equipment only — no dashboard popup auto-open.

entities:
  User:
    fields:
      id: { type: uuid }
      name: { type: string }
      email: { type: string, format: email }
      avatarUrl:
        type: string
        nullable: true
        comment: "Used for avatar chips in dashboard cards, share dialogs, alerts."
      role:
        type: enum
        values: [integrity_engineer, process_engineer, admin]
        comment: "# ASSUMPTION — verify role taxonomy with product owner."
      isCurrentUser:
        type: boolean
        default: false
        comment: "Mock-only flag indicating which User row represents the active
          session. Persisted via localStorage. Exactly one User has this set at
          any time. Replaces real auth in v1."
      createdAt: { type: datetime }
      updatedAt: { type: datetime }

  Site:
    fields:
      id: { type: uuid }
      name: { type: string }
      createdAt: { type: datetime }
      updatedAt: { type: datetime }

  Plant:
    fields:
      id: { type: uuid }
      siteId: { type: uuid, references: Site.id }
      name: { type: string }
      createdAt: { type: datetime }
      updatedAt: { type: datetime }

  Equipment:
    fields:
      id: { type: uuid }
      plantId: { type: uuid, references: Plant.id }
      name: { type: string }
      type:
        type: enum
        values: [vessel, reactor, pump, smr, other]
        comment: "# ASSUMPTION — inferred from UI naming; SMR added for Unit CFR.101 replacement scope."
      hasWhatIfTool: { type: boolean, default: false }
      createdAt: { type: datetime }
      updatedAt: { type: datetime }

  Dashboard:
    fields:
      id: { type: uuid }
      equipmentId: { type: uuid, references: Equipment.id }
      name: { type: string }
      orderIndex: { type: integer }
      sourceDashboardId:
        type: uuid
        nullable: true
        references: Dashboard.id
        comment: "Set when cloned from an existing dashboard."
      isSystemDashboard: { type: boolean, default: false }
      isFavorite:
        type: boolean
        default: false
        comment: "User-scoped favourite flag; used by Equipment Home Page Favourites section."
      lastAccessedAt:
        type: datetime
        nullable: true
        comment: "Timestamp of last user access; used by Equipment Home Page Recent section."
      lifecycleStatus:
        type: enum
        values: [created, published]
        default: created
        comment: "Workspace lifecycle: 'created' = draft visible only in owner's
          (and shared collaborators') Workspace; 'published' = also visible in
          Asset Module Equipment Home Page to users with Site/Plant/Equipment
          access."
      ownerUserId:
        type: uuid
        references: User.id
        comment: "The dashboard creator; sole owner. Sharing grants other users
          access without changing ownership."
      contributorUserIds:
        type: array
        items: { type: uuid, references: User.id }
        default: []
        comment: "Users (other than the owner) who saved at least one edit while
          holding edit permission. Derived/append-only."
      folderId:
        type: uuid
        nullable: true
        references: WorkspaceFolder.id
        comment: "Workspace folder this dashboard lives in (null = workspace root).
          Folder is owned by the same user as the dashboard."
      thumbnailUrl:
        type: string
        nullable: true
        comment: "Mock URL/path used in Workspace card grid and Recent."
      lastChangeAt:
        type: datetime
        comment: "Timestamp of last save (any contributor or owner). Drives
          Workspace 'date of change' filter and sort."
      lastChangeByUserId:
        type: uuid
        nullable: true
        references: User.id
        comment: "User who last saved a change to this dashboard."
      publishedAt:
        type: datetime
        nullable: true
        comment: "Set when lifecycleStatus transitions to 'published'."
      deletedAt:
        type: datetime
        nullable: true
        comment: "Soft-delete timestamp for Workspace Trash; null = not deleted."
      createdAt: { type: datetime }
      updatedAt: { type: datetime }

  Widget:
    fields:
      id: { type: uuid }
      key: { type: string }
      name: { type: string }
      kind:
        type: enum
        values: [kpi, chart, table, model_view, summary, generic]
      dataSourceType:
        type: enum
        values: [live_equipment, whatif_result, mixed, static_mock]
        comment: "# ASSUMPTION — intended production source modes."
      defaultConfig:
        type: json
        nullable: true
      createdAt: { type: datetime }
      updatedAt: { type: datetime }

  DashboardWidget:
    fields:
      id: { type: uuid }
      dashboardId: { type: uuid, references: Dashboard.id }
      widgetId: { type: uuid, references: Widget.id }
      x: { type: integer }
      y: { type: integer }
      w: { type: integer }
      h: { type: integer }
      minW: { type: integer, default: 2 }
      minH: { type: integer, default: 2 }
      configOverride: { type: json, nullable: true }
      createdAt: { type: datetime }
      updatedAt: { type: datetime }

  WidgetLibraryItem:
    fields:
      id: { type: uuid }
      widgetId: { type: uuid, references: Widget.id }
      displayName: { type: string }
      category: { type: string }
      defaultW: { type: integer }
      defaultH: { type: integer }
      createdAt: { type: datetime }
      updatedAt: { type: datetime }

  AppModule:
    fields:
      id: { type: uuid }
      key:
        type: enum
        values: [home, assets, workspace, insights, comms, settings]
        comment: "'workspace' is the Workspace Module — the per-user dashboard
          content management system (folders, drafts, sharing, comments,
          publishing, Workspace-native editor). 'comms' hosts the Alerts page
          for in-app notifications about dashboard sharing and permission
          requests."
      displayName: { type: string }
      createdAt: { type: datetime }
      updatedAt: { type: datetime }

  Tool:
    fields:
      id: { type: uuid }
      moduleId: { type: uuid, references: AppModule.id }
      key:
        type: enum
        values: [data_sync, shift_log, documents, whatif]
        comment: "Canonical tool keys. 'shift_log' is a placeholder — no
          implementation built yet. All tools can be launched from the
          Equipment Home Page with an equipment pre-filter context."
      name: { type: string }
      isEnabled: { type: boolean, default: true }
      supportsEquipmentFilter:
        type: boolean
        default: false
        comment: "When true, the tool accepts an equipmentId context that
          pre-filters its content on entry (from Equipment Home Page tiles)."
      createdAt: { type: datetime }
      updatedAt: { type: datetime }

  EquipmentHomeView:
    comment: "Not a persisted entity — represents the UI state/context for the
      Equipment Home Page. Captured here for relationship traceability."
    fields:
      equipmentId: { type: uuid, references: Equipment.id }
      activeDashboardPopupId:
        type: uuid
        nullable: true
        references: Dashboard.id
        comment: "ID of the dashboard currently open in the read-only popup overlay.
          Null when no popup is open. At most one popup open at a time."
      viewedDataScenarioId:
        type: uuid
        nullable: true
        references: WhatIfRunSession.id
        comment: "The What-If run session selected via Viewed Data inside the
          Dashboard Popup. Null when no overlay is applied."
      externalOpenTabCounts:
        type: map
        keyType: { type: uuid, references: Dashboard.id }
        valueType: { type: integer, min: 0 }
        comment: "Per-dashboard count of Full-Screen Viewer tabs currently open
          elsewhere (other browser tabs/windows). Maintained via cross-tab
          BroadcastChannel/storage signalling. Drives the 'open elsewhere'
          indicator on dashboard tabs / cards. A dashboard may be open in
          multiple tabs simultaneously."

  WorkspaceFolder:
    comment: "Per-user folder in the Workspace Module's Canva-like folder system.
      Folders form a nested tree owned by a single User. Dashboards live in
      exactly zero or one Folder (root = no folder)."
    fields:
      id: { type: uuid }
      ownerUserId: { type: uuid, references: User.id }
      parentFolderId:
        type: uuid
        nullable: true
        references: WorkspaceFolder.id
        comment: "Null = top-level folder under workspace root."
      name: { type: string }
      createdAt: { type: datetime }
      updatedAt: { type: datetime }

  DashboardShare:
    comment: "A direct share grant from a dashboard owner to a specific User by
      name/email. Independent of ShareLink (link-based sharing)."
    fields:
      id: { type: uuid }
      dashboardId: { type: uuid, references: Dashboard.id }
      sharedByUserId: { type: uuid, references: User.id }
      sharedWithUserId: { type: uuid, references: User.id }
      permission:
        type: enum
        values: [view, comment, edit]
        comment: "Granted permission level for the shared-with user."
      message:
        type: string
        nullable: true
        maxLength: 500
        comment: "Optional plain-text note included with the share; surfaced in
          the recipient's Alert."
      notifyOnFirstView:
        type: boolean
        default: false
        comment: "If true, the sharer receives an Alert the first time the
          recipient opens this dashboard's popup."
      firstViewedAt:
        type: datetime
        nullable: true
        comment: "Timestamp when sharedWithUser first viewed the dashboard.
          Once set, do not retrigger the first-view Alert."
      revokedAt:
        type: datetime
        nullable: true
        comment: "Set when the sharer revokes access; revoked shares no longer
          grant permission and are hidden from recipient's 'Shared with me'."
      createdAt: { type: datetime }
      updatedAt: { type: datetime }

  ShareLink:
    comment: "A copyable shareable link for a dashboard. Anyone with the link
      and a signed-in identity gets the link's permission level."
    fields:
      id: { type: uuid }
      dashboardId: { type: uuid, references: Dashboard.id }
      createdByUserId: { type: uuid, references: User.id }
      token:
        type: string
        comment: "Unique opaque token used in the /share/[token] URL. Mock-generated."
      permission:
        type: enum
        values: [view, comment, edit]
      revokedAt:
        type: datetime
        nullable: true
        comment: "When set, the link refuses access (UI shows 'no longer valid')."
      createdAt: { type: datetime }
      updatedAt: { type: datetime }

  DashboardComment:
    comment: "A single comment on a dashboard, displayed in the Workspace popup's
      Comments side panel. Not threaded in v1."
    fields:
      id: { type: uuid }
      dashboardId: { type: uuid, references: Dashboard.id }
      authorUserId: { type: uuid, references: User.id }
      body:
        type: string
        maxLength: 2000
      createdAt: { type: datetime }
      updatedAt: { type: datetime }

  PermissionRequest:
    comment: "A request from a shared-with user asking for elevated permission
      (comment or edit) on a dashboard. Resolved by the sharer via Alert action."
    fields:
      id: { type: uuid }
      dashboardId: { type: uuid, references: Dashboard.id }
      requestedByUserId: { type: uuid, references: User.id }
      requestedToUserId:
        type: uuid
        references: User.id
        comment: "Typically the dashboard owner, or the original sharer."
      requestedPermission:
        type: enum
        values: [comment, edit]
      status:
        type: enum
        values: [pending, granted, denied, cancelled]
        default: pending
      resolvedAt:
        type: datetime
        nullable: true
      createdAt: { type: datetime }
      updatedAt: { type: datetime }

  Notification:
    comment: "An in-app alert displayed on the Comms Module Alerts page for the
      current user. All sharing-related events become Notifications."
    fields:
      id: { type: uuid }
      userId:
        type: uuid
        references: User.id
        comment: "Recipient — the user this alert appears for."
      category:
        type: enum
        values:
          - dashboard_shared_with_you
          - dashboard_first_view
          - permission_request_received
          - permission_request_resolved
        comment: "v1 categories. dashboard_shared_with_you: someone shared a
          dashboard with you. dashboard_first_view: a recipient opened a
          dashboard you shared (when notifyOnFirstView=true).
          permission_request_received: someone asked for higher permission on
          your dashboard. permission_request_resolved: your permission request
          was granted or denied."
      dashboardId:
        type: uuid
        nullable: true
        references: Dashboard.id
      relatedShareId:
        type: uuid
        nullable: true
        references: DashboardShare.id
      relatedRequestId:
        type: uuid
        nullable: true
        references: PermissionRequest.id
      actorUserId:
        type: uuid
        nullable: true
        references: User.id
        comment: "The user whose action produced this Notification (sharer,
          recipient, requester, resolver)."
      title: { type: string }
      body: { type: string, nullable: true }
      readAt:
        type: datetime
        nullable: true
        comment: "Null = unread. Set when user opens or marks the alert read."
      createdAt: { type: datetime }
      updatedAt: { type: datetime }

  DashboardViewerTabSession:
    comment: "Not a persisted entity — represents one browser tab currently
      rendering the Full-Screen Dashboard Viewer route. Maintained in-memory
      and broadcast cross-tab via BroadcastChannel/storage events. Used to
      compute EquipmentHomeView.externalOpenTabCounts."
    fields:
      sessionId:
        type: string
        comment: "Per-tab UUID generated on viewer mount."
      dashboardId: { type: uuid, references: Dashboard.id }
      userId:
        type: uuid
        nullable: true
        references: User.id
      openedAt: { type: datetime }
      lastHeartbeatAt: { type: datetime }

  WhatIfScenario:
    fields:
      id: { type: uuid }
      toolId: { type: uuid, references: Tool.id }
      equipmentId: { type: uuid, references: Equipment.id }
      name: { type: string }
      description: { type: string }
      details: { type: string, nullable: true }
      createdAt: { type: datetime }
      updatedAt: { type: datetime }

  WhatIfScenarioParameter:
    fields:
      id: { type: uuid }
      scenarioId: { type: uuid, references: WhatIfScenario.id }
      name: { type: string }
      unit: { type: string, nullable: true }
      defaultValue: { type: string }
      createdAt: { type: datetime }
      updatedAt: { type: datetime }

  WhatIfRunSession:
    fields:
      id: { type: uuid }
      scenarioId: { type: uuid, references: WhatIfScenario.id }
      equipmentId: { type: uuid, references: Equipment.id }
      requestedById: { type: uuid, references: User.id, nullable: true }
      runName: { type: string }
      status: { type: enum, values: [queued, running, success, failed, cancelled] }
      progressStep: { type: integer, min: 0, max: 5 }
      source: { type: enum, values: [tool, dashboard] }
      parameterInputMode: { type: enum, values: [full-csv, per-parameter-csv, typed, mixed] }
      startedAt: { type: datetime, nullable: true }
      completedAt: { type: datetime, nullable: true }
      durationSeconds:
        type: integer
        nullable: true
        comment: "# ASSUMPTION — UI currently stores formatted duration strings."
      createdAt: { type: datetime }
      updatedAt: { type: datetime }

  WhatIfRunInput:
    fields:
      id: { type: uuid }
      runSessionId: { type: uuid, references: WhatIfRunSession.id }
      parameterId: { type: uuid, references: WhatIfScenarioParameter.id, nullable: true }
      parameterNameSnapshot: { type: string }
      value: { type: string }
      sourceType: { type: enum, values: [typed, full_csv, per_parameter_csv, mixed] }
      createdAt: { type: datetime }
      updatedAt: { type: datetime }

  WhatIfRunResult:
    fields:
      id: { type: uuid }
      runSessionId: { type: uuid, references: WhatIfRunSession.id }
      metricName: { type: string }
      value: { type: string }
      status: { type: enum, values: [pass, warning, fail] }
      included: { type: boolean, default: true }
      orderIndex: { type: integer }
      createdAt: { type: datetime }
      updatedAt: { type: datetime }

  UserDocument:
    fields:
      id: { type: uuid }
      name: { type: string }
      fileType: { type: enum, values: [pdf, docx, xlsx, link] }
      category: { type: enum, values: [uploaded, shared] }
      subType: { type: enum, values: [general, whatif_parameter_report, whatif_visual_report], default: general }
      siteId: { type: uuid, nullable: true, references: Site.id }
      plantId: { type: uuid, nullable: true, references: Plant.id }
      equipmentId: { type: uuid, nullable: true, references: Equipment.id }
      sourceRunSessionId: { type: uuid, nullable: true, references: WhatIfRunSession.id }
      createdAt: { type: datetime }
      updatedAt: { type: datetime }

  ChangeLogEntry:
    fields:
      id: { type: uuid }
      type: { type: enum, values: [dashboard, operation] }
      action: { type: string }
      locationLabel: { type: string }
      userId: { type: uuid, nullable: true, references: User.id }
      occurredAt: { type: datetime }
      createdAt: { type: datetime }
      updatedAt: { type: datetime }

  DataSyncStatus:
    fields:
      id: { type: uuid }
      equipmentId: { type: uuid, references: Equipment.id }
      totalFiles: { type: integer }
      loadedFiles: { type: integer }
      errorFiles: { type: integer }
      lastUpdatedAt: { type: datetime }
      createdAt: { type: datetime }
      updatedAt: { type: datetime }

  SyncJob:
    fields:
      id: { type: uuid }
      equipmentId: { type: uuid, references: Equipment.id }
      userId: { type: uuid, nullable: true, references: User.id }
      description: { type: string }
      status: { type: enum, values: [queued, running, success, failed, cancelled] }
      startedAt: { type: datetime, nullable: true }
      completedAt: { type: datetime, nullable: true }
      elapsedSeconds: { type: integer, nullable: true }
      tokenCount: { type: integer, default: 0 }
      createdAt: { type: datetime }
      updatedAt: { type: datetime }

relationships:
  - "A Site has many Plants; a Plant belongs to one Site."
  - "A Plant has many Equipment; an Equipment belongs to one Plant."
  - "An Equipment has zero or many Dashboards."
  - "A Widget can appear in many Dashboards via DashboardWidget."
  - "A Dashboard has many DashboardWidgets; each DashboardWidget references one Widget."
  - "A Tool belongs to one AppModule; What-If Scenario is a Tool under the Tools module."
  - "A WhatIfScenario belongs to one Equipment."
  - "A WhatIfScenario has many parameters and many run sessions (history)."
  - "A WhatIfRunSession has many inputs and many results."
  - "A UserDocument can optionally reference Site, Plant, Equipment, and source WhatIfRunSession."
  - "A DataSyncStatus belongs to one Equipment."
  - "A SyncJob belongs to one Equipment and optionally one User."
  - "An EquipmentHomeView is scoped to one Equipment and can show one Dashboard via popup at a time."
  - "Navigating from an EquipmentHomeView tool tile to a Tool passes the Equipment context as a pre-filter; the Tool's supportsEquipmentFilter flag indicates this is supported."
  - "The Workspace AppModule is the target for the Equipment Home Page 'Edit Dashboards' action; the equipment context is forwarded so the Workspace pre-filters on that equipment."
  - "A Dashboard has exactly one owner User (Dashboard.ownerUserId) and zero or many contributor Users."
  - "A Dashboard belongs to zero or one WorkspaceFolder; a WorkspaceFolder belongs to exactly one User and may have a parent WorkspaceFolder (nested tree)."
  - "A Dashboard has zero or many DashboardShares (one per shared-with User) and zero or many ShareLinks."
  - "A Dashboard has zero or many DashboardComments authored by Users with comment or edit permission (or by the owner)."
  - "A PermissionRequest references one Dashboard, the requester User, and the resolver User (typically the owner)."
  - "A Notification references one recipient User and optionally a Dashboard, DashboardShare, PermissionRequest, and actor User."
  - "A DashboardViewerTabSession is scoped to one Dashboard and is signalled cross-tab; the EquipmentHomeView aggregates active sessions into externalOpenTabCounts per dashboard."

business_rules:
  - "KPI is represented as a Widget subtype; there is no separate EquipmentKPI entity."
  - "Users can create a dashboard from blank or clone an existing dashboard; name must be unique per equipment."
  - "Users can drag/drop, resize, and remove widgets while editing dashboards."
  - "Clicking a dashboard tab in the Equipment Dashboard must switch the active tab AND render that tab's widget grid."
  - "Creating a new dashboard must navigate the user to the new tab immediately after creation."
  - "Users can queue multiple What-If runs while another run is running."
  - "The old rule requiring selected dashboards for a run is removed."
  - "What-If results can be surfaced through Viewed Data on the Equipment Dashboard."
  - "What-If Scenarios are accessed from the Tools module."
  - "Documents generated from runs are stored in the same document library."
  - "For the current mock profile, Unit CFR.101 replaces the previous pump equipment with an SMR equipment."
  - "For the current mock profile, the SMR equipment has one dashboard named 'SMR Pigtail Integrity'."
  - "For the current mock profile, dashboard widgets must be SMR-relevant, including a model_view widget showing an SMR mockup (not pump geometry)."
  - "Navigating to an Equipment asset from the Asset module hierarchy now lands on the Equipment Home Page, not directly on the dashboard editor."
  - "The Equipment Home Page groups the equipment's dashboards into Recent and Favourites sections; Dashboard.lastAccessedAt drives Recent; Dashboard.isFavorite drives Favourites."
  - "The Dashboard Popup on the Equipment Home Page is strictly read-only; widget editing controls (drag, resize, add, remove) must be hidden."
  - "At most one Dashboard Popup may be open at a time on the Equipment Home Page."
  - "Viewed Data, generate-report, and share functions are available inside the Dashboard Popup, reusing the existing mechanism."
  - "The Tools Section on the Equipment Home Page shows four fixed tiles: Data & Sync, Shift Log, Documents, What-If Scenario."
  - "Shift Log tool tile is a non-interactive placeholder; clicking it has no effect."
  - "Clicking Data & Sync, Documents, or What-If Scenario tiles navigates to the Tools module with equipmentId pre-applied as a filter via Zustand state."
  - "The Data & Sync tool page must support equipment-level filtering; navigating from the Equipment Home Page pre-applies the source equipment filter."
  - "The Edit Dashboards action on the Equipment Home Page navigates to the Workspace module (currently a stub; destination is the existing dashboard editor until full Workspace spec is delivered)."
  - "The Workspace module key is 'workspace' in AppModule.key; it is not yet fully implemented."
  - "From Site Overview and Plant Overview dashboard tab stacks, clicking a dashboard tab must navigate to Equipment Home Page and auto-open the matching read-only Dashboard Popup tab for that equipment."
  - "From Site Overview and Plant Overview dashboard tab stacks, clicking the equipment-name label must navigate to that equipment's Equipment Home Page without auto-opening a dashboard popup."
  - "Equipment-name labels in dashboard tab stacks are interactive link-style controls (explicit clickable affordance) and must not trigger tab expansion when clicked."
  # ── Workspace Module ────────────────────────────────────────────────────────
  - "The Workspace Module is per-user: a user sees only their own dashboards, their own folders, and dashboards explicitly shared with them. Other users' workspaces are not visible."
  - "Each Dashboard has exactly one owner User; ownership is set at creation and does not change via sharing or publishing."
  - "Dashboard.lifecycleStatus transitions are: created -> published (publish action) and published -> created (unpublish action), both performed only by the owner."
  - "A 'created' dashboard is visible only to its owner and to users it has been shared with (DashboardShare or ShareLink); it never appears in the Asset Module."
  - "A 'published' dashboard is visible in the Asset Module Equipment Home Page to users with access to its Site/Plant/Equipment, AND remains in the owner's Workspace (publishing does not remove it)."
  - "The Asset Module Equipment Home Page shows only published dashboards for the equipment; created/draft dashboards are hidden from Asset Module."
  - "WorkspaceFolders are user-owned and form a nested tree rooted at workspace root (parentFolderId = null); UI must support at least 5 levels of nesting."
  - "A Dashboard belongs to zero or one WorkspaceFolder owned by the same User as the dashboard owner; moving a dashboard updates only Dashboard.folderId."
  - "Deleting a WorkspaceFolder requires the user to choose 'move contents to root' or 'delete contents' (cascade soft-delete)."
  - "Users can search and filter dashboards in their Workspace by equipment, lifecycleStatus, owner (creator), contributor, and lastChangeAt date range."
  - "Users can create, duplicate, rename, move, and soft-delete their own dashboards from the Workspace; soft-deleted dashboards live in Trash with deletedAt set."
  - "Duplicating a dashboard creates a new Dashboard with a new id, lifecycleStatus='created', sourceDashboardId set to the original, name prefixed 'Copy of ', folderId copied from the original, and ownerUserId set to the duplicating user."
  - "The Workspace Dashboard Popup exposes three independent actions: expand-to-fullscreen (within the same tab), toggle Comments side panel, and Edit dashboard."
  - "The Workspace Dashboard Popup additionally exposes 'Open in new tab', which navigates a new browser tab to the Full-Screen Dashboard Viewer route and closes the popup in the originating tab."
  - "Edit and Comment in the Workspace Dashboard Popup are always enabled for the dashboard owner. For shared-with users they are enabled iff the active DashboardShare or ShareLink grants edit/comment permission, respectively."
  - "Saving a dashboard edit by a non-owner with edit permission appends that user to Dashboard.contributorUserIds (idempotent) and updates lastChangeAt and lastChangeByUserId."
  - "The Workspace-native Dashboard Editor is a NEW component that reuses the existing Widget Library catalog without modification; it does not import the legacy Equipment Dashboard editor and does not render dashboard tabs at the bottom."
  - "DashboardShare grants are per-recipient and may be revoked; revoked shares no longer grant access and are hidden from the recipient's 'Shared with me'."
  - "ShareLink grants permission to any signed-in user that opens the link; if revoked, the link refuses access."
  - "A user with view permission may not comment or edit; comment permission implies view; edit permission implies comment+view."
  - "Users without comment/edit permission on a shared dashboard may submit a PermissionRequest from the Dashboard Popup; this generates a 'permission_request_received' Notification for the dashboard owner."
  - "Resolving a PermissionRequest (granted/denied) generates a 'permission_request_resolved' Notification for the requester; granting also creates or upgrades the corresponding DashboardShare."
  - "When DashboardShare.notifyOnFirstView is true, the first time the recipient opens the dashboard popup sets DashboardShare.firstViewedAt and produces a 'dashboard_first_view' Notification for the sharer; this fires at most once per share."
  - "Comments on owner-owned dashboards do NOT generate Notifications; only sharing-related events do."
  - "The Comms Module Alerts page lists all Notifications for the current user in reverse-chronological order; each item exposes a 'View' action that deep-links into the Workspace and marks the Notification read."
  - "The Comms module rail icon shows an unread-count badge equal to count(Notification where readAt is null)."
  # ── Asset Module — Full-Screen Viewer & Multi-Tab ──────────────────────────
  - "The Equipment Home Page Dashboard Popup includes 'Open in new tab', which opens /dashboards/[dashboardId]/full in a new browser tab and closes the popup in the originating tab."
